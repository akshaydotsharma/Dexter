services:
  # Backend API
  - type: web
    name: personal-dashboard-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in dashboard (Supabase connection string)
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in dashboard

  # Frontend (Static Site)
  - type: web
    name: personal-dashboard-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeploy: true
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://personal-dashboard-g0w8.onrender.com/api
