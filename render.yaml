services:
  - type: web
    name: personal-dashboard-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/config
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: personal-dashboard-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in dashboard

databases:
  - name: personal-dashboard-db
    plan: free
