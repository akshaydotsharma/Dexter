services:
  - type: web
    name: personal-dashboard-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /api/config
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually in dashboard (Supabase connection string)
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in dashboard
