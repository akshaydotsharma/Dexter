name: PersonalDashboard
options:
  bundleIdPrefix: com.akshaysharma
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  PersonalDashboard:
    type: application
    platform: iOS
    sources:
      - path: PersonalDashboard
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Fonts/**"
      - path: PersonalDashboard/Resources/Preview Content
        type: folder
      - path: PersonalDashboard/Resources/Fonts
        buildPhase: resources
      - path: PersonalDashboard/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - target: DeksWidgets
        embed: true
    info:
      path: PersonalDashboard/Info.plist
      properties:
        CFBundleDisplayName: Deks
        # Versioning scheme: "a.b.c (d)" — see mobile/ota/ship-lan.sh for the
        # derivation. a.b come from mobile/VERSION; c is auto-derived from
        # git history (commits since VERSION last changed); d is a local
        # build counter at mobile/.build_count.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        OTA_API_URL: $(OTA_API_URL)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # Allow plain-HTTP calls to the Mac dev server on the local network.
        # Personal-use dev build only — App Store distribution is not a goal.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Triggers the iOS local-network permission prompt the first time
        # the App Intent or main app reaches a LAN IP.
        NSLocalNetworkUsageDescription: "Deks talks to your Mac dev server over wifi when you're on the same network."
        # Bonjour service types our launch primer browses for. Required
        # alongside NSLocalNetworkUsageDescription, otherwise the browse
        # silently fails and the prompt never appears.
        NSBonjourServices:
          - _http._tcp
        # Voice input in chat (issue #83). On-device only — audio never
        # leaves the phone. Both keys are required: Speech for transcription,
        # Microphone for the audio capture that feeds it.
        NSSpeechRecognitionUsageDescription: "Deks transcribes your voice into chat messages on-device. Audio never leaves your phone."
        NSMicrophoneUsageDescription: "Deks listens to your voice so it can transcribe what you say into the chat."
        # Required for the Capture App Intent to start a Live Activity in
        # the Dynamic Island while the on-device pipeline runs (issue #85).
        NSSupportsLiveActivities: true
        UIAppFonts:
          - Calistoga-Regular.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_ASSET_PATHS: '"PersonalDashboard/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Default version values — overridden by ship-lan.sh on every ship.
        # Local Xcode-only builds (Cmd+R) inherit these as-is.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  DeksWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: DeksWidgets
      # ActivityAttributes for the Capture Live Activity. Lives under the
      # main app's Intents/ folder (where the controller and intent that
      # use it live), and we list it explicitly here so the widget
      # extension compiles against the same type without owning a
      # separate copy. Adding the directory itself would drag the rest of
      # the app's Intents into the widget module — we only want this one
      # file.
      - path: PersonalDashboard/Intents/CaptureActivityAttributes.swift
    info:
      path: DeksWidgets/Info.plist
      properties:
        CFBundleDisplayName: Deks Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Allow Live Activities. The host app's Info.plist also carries
        # this key — both are required.
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard.widgets
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        SKIP_INSTALL: NO
        # Default version values, overridden by ship-lan.sh just like the
        # main app target.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
