name: PersonalDashboard
options:
  bundleIdPrefix: com.akshaysharma
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  PersonalDashboard:
    type: application
    platform: iOS
    sources:
      - path: PersonalDashboard
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Fonts/**"
          - "App/DexterMacApp.swift"   # macOS @main; belongs only to DexterMac target
          - "InfoMac.plist"            # generated Info.plist for the macOS target
      - path: PersonalDashboard/Resources/Preview Content
        type: folder
      - path: PersonalDashboard/Resources/Fonts
        buildPhase: resources
      - path: PersonalDashboard/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: PersonalDashboard/Info.plist
      properties:
        CFBundleDisplayName: Dexter
        # Versioning scheme: "a.b.c (d)" — see mobile/ota/ship-lan.sh for the
        # derivation. a.b come from mobile/VERSION; c is auto-derived from
        # git history (commits since VERSION last changed); d is a local
        # build counter at mobile/.build_count.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        OTA_API_URL: $(OTA_API_URL)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # OpenAI key for cloud voice transcription (#151). Injected at
        # archive time by ship-lan.sh; empty for plain Xcode builds.
        OPENAI_API_KEY: $(OPENAI_API_KEY)
        # Allow plain-HTTP calls to the Mac dev server on the local network.
        # Personal-use dev build only — App Store distribution is not a goal.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Triggers the iOS local-network permission prompt the first time
        # the App Intent or main app reaches a LAN IP.
        NSLocalNetworkUsageDescription: "Dexter talks to your Mac dev server over wifi when you're on the same network."
        # Bonjour service types our launch primer browses for. Required
        # alongside NSLocalNetworkUsageDescription, otherwise the browse
        # silently fails and the prompt never appears.
        NSBonjourServices:
          - _http._tcp
        # Deep-link scheme used by the Shortcut capture result snippet
        # ("Open in Dexter" button) and any future external entry points.
        # Routes are parsed in ContentView.onOpenURL:
        #   dexter://focus/<section>/<uuid>  — open a section and focus a row
        #   dexter://activity                — open the Activity timeline
        CFBundleURLTypes:
          - CFBundleURLName: com.akshaysharma.personaldashboard.deeplink
            CFBundleURLSchemes:
              - dexter
        # Voice input in chat (issues #83, #151). Primary path uploads a
        # short recording to OpenAI for transcription (auto-detects Hindi /
        # English / Hinglish). Speech key is still required for the on-device
        # English fallback used when no OpenAI key is configured.
        NSSpeechRecognitionUsageDescription: "Dexter transcribes your voice into chat messages. With no transcription key set it falls back to on-device English recognition."
        NSMicrophoneUsageDescription: "Dexter records your voice so it can transcribe what you say into the chat."
        # Receipt capture for Finance (issue #114, Phase B). Camera + photo
        # library access used by AddExpense flow to extract details via Vision.
        NSCameraUsageDescription: "Used to capture receipts so Dexter can log expenses for you."
        NSPhotoLibraryUsageDescription: "Used to import a receipt photo when logging an expense."
        # Email-to-itinerary ingestion (#143). `fetch` lets the
        # BGAppRefreshTask wake the app to poll the receipts inbox over IMAP;
        # `processing` covers the longer on-device AI matching pass. The
        # scheduler identifier must match EmailIngestCoordinator.refreshTaskId.
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.akshaysharma.personaldashboard.emailIngestRefresh
          # Recurring-expense materialisation (#236). Must match
          # RecurringExpenseCoordinator.refreshTaskId. Best-effort background
          # top-up; the foreground pass is the reliable path.
          - com.akshaysharma.personaldashboard.recurringExpenseRefresh
        UIAppFonts:
          - Calistoga-Regular.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_ASSET_PATHS: '"PersonalDashboard/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Default version values — overridden by ship-lan.sh on every ship.
        # Local Xcode-only builds (Cmd+R) inherit these as-is.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"

  # Native macOS app (issue #281). Shares the portable model/design/service
  # layer with the iOS target via an explicit curated source list — only files
  # that compile on macOS (UIKit shimmed behind `#if canImport(UIKit)`) are
  # included. The first feature is Tasks; the list grows as surfaces are ported.
  DexterMac:
    type: application
    platform: macOS
    sources:
      - path: PersonalDashboard/Models
      - path: PersonalDashboard/Cache/SwiftDataStore.swift
      - path: PersonalDashboard/Cache/StoreChange.swift
      - path: PersonalDashboard/Design
      - path: PersonalDashboard/App/AppRouter.swift
      - path: PersonalDashboard/App/DexterMacApp.swift
      - path: PersonalDashboard/ViewModels/TodosViewModel.swift
      - path: PersonalDashboard/Services/TodoService.swift
      - path: PersonalDashboard/Services/MapsLinkResolver.swift
      - path: PersonalDashboard/Services/APIError.swift
      - path: PersonalDashboard/ViewModels/NotesViewModel.swift
      - path: PersonalDashboard/ViewModels/ListsViewModel.swift
      - path: PersonalDashboard/Services/NoteService.swift
      - path: PersonalDashboard/Services/ChecklistService.swift
      - path: PersonalDashboard/Services/FinanceSettings.swift
      - path: PersonalDashboard/Views/Tasks
      - path: PersonalDashboard/Views/Lists/ListsView.swift
      - path: PersonalDashboard/Views/Today/TodayView.swift
      - path: PersonalDashboard/Views/Notes/NotesView.swift
      - path: PersonalDashboard/Views/Components/MarkdownEditor.swift
      - path: PersonalDashboard/Views/Activity/ActivityView.swift
      - path: PersonalDashboard/Views/Finance/FinanceDashboardBand.swift
      - path: PersonalDashboard/Views/Settings/PersonalVocabularyView.swift
      - path: PersonalDashboard/Views/Components/GhostAddRow.swift
      - path: PersonalDashboard/Views/Components/DeleteRowButton.swift
      - path: PersonalDashboard/Views/Components/SectionEyebrow.swift
      - path: PersonalDashboard/Views/Components/MarkdownView.swift
      - path: PersonalDashboard/Views/Shell/TopBar.swift
      - path: PersonalDashboard/Views/Shell/BottomTabBarMetrics.swift
      # Chat (issue #281). Text chat only — the voice capture path
      # (VoiceCaptureViewModel / SpeechTranscriber / overlay / InkOrb /
      # WaveformBars) is AVFoundation/Speech-coupled and gated off with
      # `#if os(iOS)` inside ChatView, so those files stay out of this target.
      - path: PersonalDashboard/App/AppConfig.swift
      - path: PersonalDashboard/Views/Chat/ChatView.swift
      - path: PersonalDashboard/Views/Chat/ChatInputBar.swift
      - path: PersonalDashboard/Views/Chat/ChatComponents.swift
      - path: PersonalDashboard/Views/Chat/ChatResultCard.swift
      - path: PersonalDashboard/ViewModels/ChatViewModel.swift
      - path: PersonalDashboard/AI/ChatStream.swift
      - path: PersonalDashboard/AI/AnthropicClient.swift
      - path: PersonalDashboard/AI/AssistantContextBuilder.swift
      - path: PersonalDashboard/AI/ChatDraft.swift
      - path: PersonalDashboard/AI/ChatActionResult.swift
      - path: PersonalDashboard/AI/ToolDefinitions.swift
      - path: PersonalDashboard/AI/ExecuteDraftAction.swift
      - path: PersonalDashboard/Services/AIStreamingService.swift
      - path: PersonalDashboard/Services/FXService.swift
      - path: PersonalDashboard/Services/ExpenseService.swift
      - path: PersonalDashboard/Services/PersonService.swift
      - path: PersonalDashboard/Services/EventService.swift
      - path: PersonalDashboard/Services/RecurringExpenseService.swift
      - path: PersonalDashboard/Services/RecurringExpenseNotifications.swift
      - path: PersonalDashboard/Resources/Fonts
        type: folder
        buildPhase: resources
      - path: PersonalDashboard/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: PersonalDashboard/InfoMac.plist
      properties:
        CFBundleDisplayName: Dexter
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "14.0"
        ITSAppUsesNonExemptEncryption: false
        # Anthropic Messages API key for on-device Chat (issue #281). Mirrors
        # the iOS target: env var wins for `xcodebuild ANTHROPIC_API_KEY=…`,
        # else this $(ANTHROPIC_API_KEY) build setting. Empty in a plain Xcode
        # build, in which case Chat degrades gracefully ("not configured").
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # Custom fonts ship as a Fonts/ folder reference; register them for
        # AppKit/SwiftUI. `.custom()` falls back to system font if this fails.
        ATSApplicationFontsPath: Fonts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard.mac
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Dev-only build run from Xcode. Sandbox off keeps file access simple
        # for the later iCloud-backup-restore milestone; revisit before any
        # signed distribution.
        ENABLE_APP_SANDBOX: NO

  PersonalDashboardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PersonalDashboardUITests
    dependencies:
      - target: PersonalDashboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard.uitests
        TEST_TARGET_NAME: PersonalDashboard
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

  # Logic-level unit tests, hosted in the app so `@testable import
  # PersonalDashboard` can reach the importer + dedup internals. Wired for the
  # `test` action only (not `all`), so `ship-lan.sh`'s archive of the app target
  # never builds it. Depending on the app target makes xcodegen set TEST_HOST /
  # BUNDLE_LOADER automatically.
  PersonalDashboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PersonalDashboardTests
    dependencies:
      - target: PersonalDashboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard.tests
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PersonalDashboard:
    build:
      targets:
        PersonalDashboard: all
        PersonalDashboardUITests: [test]
        PersonalDashboardTests: [test]
    test:
      gatherCoverageData: false
      targets:
        - PersonalDashboardTests
        - PersonalDashboardUITests
  DexterMac:
    build:
      targets:
        DexterMac: all
    run:
      config: Debug
