name: PersonalDashboard
options:
  bundleIdPrefix: com.akshaysharma
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  PersonalDashboard:
    type: application
    platform: iOS
    sources:
      - path: PersonalDashboard
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Fonts/**"
      - path: PersonalDashboard/Resources/Preview Content
        type: folder
      - path: PersonalDashboard/Resources/Fonts
        buildPhase: resources
      - path: PersonalDashboard/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: PersonalDashboard/Info.plist
      properties:
        CFBundleDisplayName: Dashboard
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        OTA_API_URL: $(OTA_API_URL)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # Allow plain-HTTP calls to the Mac dev server on the local network.
        # Personal-use dev build only — App Store distribution is not a goal.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Triggers the iOS local-network permission prompt the first time
        # the App Intent or main app reaches a LAN IP.
        NSLocalNetworkUsageDescription: "Personal Dashboard talks to your Mac dev server over wifi when you're on the same network."
        # Bonjour service types our launch primer browses for. Required
        # alongside NSLocalNetworkUsageDescription, otherwise the browse
        # silently fails and the prompt never appears.
        NSBonjourServices:
          - _http._tcp
        UIAppFonts:
          - Calistoga-Regular.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
        # Custom URL scheme for capture-confirmation notification taps and any
        # future deeplinks. Format: personaldashboard://<section>[/<uuid>]
        # e.g. personaldashboard://tasks/A1B2C3D4-... opens the Tasks surface.
        CFBundleURLTypes:
          - CFBundleURLName: com.akshaysharma.personaldashboard
            CFBundleURLSchemes:
              - personaldashboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_ASSET_PATHS: '"PersonalDashboard/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
