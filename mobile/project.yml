name: PersonalDashboard
options:
  bundleIdPrefix: com.akshaysharma
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

targets:
  PersonalDashboard:
    type: application
    platform: iOS
    sources:
      - path: PersonalDashboard
        excludes:
          - "Resources/Preview Content/**"
          - "Resources/Fonts/**"
      - path: PersonalDashboard/Resources/Preview Content
        type: folder
      - path: PersonalDashboard/Resources/Fonts
        buildPhase: resources
      - path: PersonalDashboard/Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: PersonalDashboard/Info.plist
      properties:
        CFBundleDisplayName: Dashboard
        # Resolved from Xcode build settings (MARKETING_VERSION + CURRENT_PROJECT_VERSION)
        # which `mobile/ota/ship-lan.sh` overrides with the project's marketing
        # version and a fresh Unix timestamp on every ship — so the drawer's
        # "v0.1.0 (1762597214)" line actually changes between builds.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Short git SHA of the commit this build was archived from. Populated
        # by ship-lan.sh; falls back to "dev" for local Xcode-only builds.
        GIT_COMMIT_SHA: $(GIT_COMMIT_SHA)
        UILaunchScreen:
          UIColorName: AccentColor
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        OTA_API_URL: $(OTA_API_URL)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # Allow plain-HTTP calls to the Mac dev server on the local network.
        # Personal-use dev build only — App Store distribution is not a goal.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        # Triggers the iOS local-network permission prompt the first time
        # the App Intent or main app reaches a LAN IP.
        NSLocalNetworkUsageDescription: "Personal Dashboard talks to your Mac dev server over wifi when you're on the same network."
        # Bonjour service types our launch primer browses for. Required
        # alongside NSLocalNetworkUsageDescription, otherwise the browse
        # silently fails and the prompt never appears.
        NSBonjourServices:
          - _http._tcp
        UIAppFonts:
          - Calistoga-Regular.ttf
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - JetBrainsMono-Regular.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.akshaysharma.personaldashboard
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_ASSET_PATHS: '"PersonalDashboard/Resources/Preview Content"'
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: "5.0"
        DEVELOPMENT_TEAM: "PJFPUSSNUW"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Default version values — overridden by ship-lan.sh on every ship.
        # Local Xcode-only builds (Cmd+R) inherit these as-is.
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GIT_COMMIT_SHA: "dev"
